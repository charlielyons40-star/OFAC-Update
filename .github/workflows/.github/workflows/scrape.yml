name: Auto-update OFAC data

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run scraper
        run: python scrape.py || echo "Scraper failed, keeping existing data"
      - name: Commit updated data
        run: |
          git config user.name "ofac-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update OFAC data $(date +'%Y-%m-%d')"
          git push
