<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFAC Action Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F5F5;
    --ink: #222222;
    --ink-mid: #555555;
    --ink-light: #999999;
    --rule: #DEDEDE;
    --red: #B03030;
    --red-bg: #F8EEEE;
    --green: #2A6040;
    --green-bg: #EDF4F0;
    --blue: #2A4A7A;
    --blue-bg: #EDF1F8;
    --amber: #6A4A10;
    --amber-bg: #F7F2E8;
    --purple: #4A3878;
    --purple-bg: #F0EDF8;
    --teal: #1A5555;
    --teal-bg: #EAF3F3;
    --serif: 'Libre Baskerville', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--ink);
    padding: 0 40px;
    display: flex;
    align-items: stretch;
    justify-content: space-between;
  }

  .header-left {
    padding: 20px 0;
  }

  .app-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .last-updated {
    font-size: 11px;
    color: var(--ink-light);
    text-align: right;
  }

  .last-updated span {
    display: block;
    font-size: 12px;
    color: var(--ink-mid);
    font-weight: 500;
  }

  .refresh-btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 18px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
  }
  .refresh-btn:hover { background: var(--ink); color: var(--cream); }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  /* TICKER */
  .ticker-bar {
    background: var(--ink);
    color: var(--cream);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 6px 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .ticker-inner {
    display: inline-block;
    animation: ticker 40s linear infinite;
  }

  .ticker-inner span { margin-right: 60px; }
  .ticker-inner .dot { color: #C0392B; margin-right: 8px; }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* MAIN LAYOUT */
  main {
    display: grid;
    grid-template-columns: 220px 1fr 260px;
    gap: 0;
    min-height: calc(100vh - 100px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--rule);
    padding: 28px 24px;
  }

  .sidebar-section {
    margin-bottom: 28px;
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .filter-list { list-style: none; }

  .filter-list li {
    margin-bottom: 1px;
  }

  .filter-list button {
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink-mid);
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.12s;
  }

  .filter-list button:hover { background: rgba(0,0,0,0.05); color: var(--ink); }
  .filter-list button.active { background: var(--ink); color: var(--cream); }

  .filter-list button .count {
    font-size: 10px;
    opacity: 0.6;
    font-weight: 500;
  }

  /* FEED */
  .feed-col {
    padding: 28px 32px;
    border-right: 1px solid var(--rule);
  }

  .feed-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }

  .feed-heading {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 700;
  }

  .feed-count {
    font-size: 12px;
    color: var(--ink-light);
  }

  .search-wrap {
    margin-bottom: 16px;
  }

  .search-input {
    width: 100%;
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--rule);
    background: white;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--ink); }
  .search-input::placeholder { color: var(--ink-light); }

  /* ACTION CARDS */
  .action-card {
    border: 1px solid var(--rule);
    background: white;
    margin-bottom: 10px;
    padding: 16px 18px;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .action-card:hover { border-color: var(--ink-mid); }
  .action-card.selected { border-color: var(--ink); border-left: 3px solid var(--ink); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }

  .card-title {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--ink);
  }

  .card-date {
    font-size: 10px;
    color: var(--ink-light);
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .card-desc {
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.55;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }

  .tag {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
  }

  .tag.designation { background: var(--red-bg); color: var(--red); }
  .tag.removal { background: var(--green-bg); color: var(--green); }
  .tag.license { background: var(--blue-bg); color: var(--blue); }
  .tag.update { background: var(--amber-bg); color: var(--amber); }
  .tag.russia { background: var(--purple-bg); color: var(--purple); }
  .tag.iran { background: #FDF0F7; color: #7A1A5A; }
  .tag.venezuela { background: var(--amber-bg); color: var(--amber); }
  .tag.cuba { background: var(--teal-bg); color: var(--teal); }
  .tag.ct { background: var(--red-bg); color: var(--red); }
  .tag.nk { background: #F2F2F2; color: #444; }
  .tag.cyber { background: var(--blue-bg); color: var(--blue); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-light);
    font-family: var(--serif);
    font-style: italic;
  }

  /* DETAIL PANEL */
  .detail-panel {
    padding: 28px 24px;
    position: sticky;
    top: 0;
    max-height: 100vh;
    overflow-y: auto;
  }

  .detail-placeholder {
    color: var(--ink-light);
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    margin-top: 40px;
    text-align: center;
    line-height: 1.8;
  }

  .detail-content { display: none; }
  .detail-content.visible { display: block; }

  .detail-program-bar {
    display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px;
  }

  .detail-date {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .detail-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 14px;
    color: var(--ink);
  }

  .detail-body {
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink-mid);
    margin-bottom: 20px;
    border-top: 1px solid var(--rule);
    padding-top: 14px;
  }

  .detail-section-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 500;
    margin-bottom: 8px;
    margin-top: 18px;
  }

  .detail-implications {
    font-size: 12px;
    line-height: 1.7;
    color: var(--ink-mid);
  }

  .detail-implications li {
    margin-bottom: 6px;
    padding-left: 16px;
    position: relative;
  }
  .detail-implications li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--ink-light);
  }

  .detail-link {
    display: block;
    margin-top: 20px;
    font-size: 11px;
    color: var(--ink);
    text-decoration: none;
    border: 1px solid var(--rule);
    padding: 8px 12px;
    text-align: center;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    transition: background 0.15s;
  }
  .detail-link:hover { background: var(--ink); color: var(--cream); }

  .ask-claude-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 12px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    cursor: pointer;
    text-align: center;
    transition: opacity 0.15s;
  }
  .ask-claude-btn:hover { opacity: 0.8; }

  /* STATS ROW */
  .stats-row {
    display: flex;
    border-bottom: 1px solid var(--rule);
    border-top: 1px solid var(--rule);
  }

  .stat-box {
    flex: 1;
    padding: 14px 20px;
    border-right: 1px solid var(--rule);
    text-align: center;
  }
  .stat-box:last-child { border-right: none; }

  .stat-num {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .stat-num.red { color: var(--red); }
  .stat-num.green { color: var(--green); }
  .stat-num.blue { color: var(--blue); }
  .stat-num.amber { color: var(--amber); }

  /* LOADING */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(247,244,239,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--ink-mid);
  }
  .loading-overlay.visible { display: flex; }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--rule); padding: 20px; }
    .filter-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-list li { margin-bottom: 0; }
    .filter-list button { width: auto; padding: 5px 12px; font-size: 12px; }
    .detail-panel { display: none; }
    header { padding: 0 20px; }
    .feed-col { padding: 20px; }
    .stats-row { overflow-x: auto; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">Fetching latest OFAC actions…</div>

<header>
  <div style="display:flex; align-items:stretch;">
    <div class="header-left">
      <div class="app-title">OFAC Action Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="last-updated">
      Last refreshed<span id="lastUpdatedTime">—</span>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAndRender()">↻ Refresh</button>
  </div>
</header>

<!-- Ticker -->
<div class="ticker-bar">
  <div class="ticker-inner" id="tickerInner">
    <span><span class="dot">●</span>Loading latest OFAC actions…</span>
    <span><span class="dot">●</span>Loading latest OFAC actions…</span>
  </div>
</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-box"><div class="stat-num red" id="statDesig">—</div><div class="stat-label">Designations</div></div>
  <div class="stat-box"><div class="stat-num green" id="statRemoval">—</div><div class="stat-label">Removals</div></div>
  <div class="stat-box"><div class="stat-num blue" id="statLicense">—</div><div class="stat-label">Gen. Licenses</div></div>
  <div class="stat-box"><div class="stat-num amber" id="statTotal">—</div><div class="stat-label">Total Actions</div></div>
</div>

<main>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Action Type</div>
      <ul class="filter-list" id="typeFilters">
        <li><button class="active" data-filter="all">All Actions <span class="count" id="countAll"></span></button></li>
        <li><button data-filter="designation">Designations <span class="count" id="countDesig"></span></button></li>
        <li><button data-filter="removal">Removals <span class="count" id="countRemoval"></span></button></li>
        <li><button data-filter="license">General Licenses <span class="count" id="countLicense"></span></button></li>
        <li><button data-filter="update">Updates <span class="count" id="countUpdate"></span></button></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Program</div>
      <ul class="filter-list" id="progFilters">
        <li><button data-filter="russia">Russia</button></li>
        <li><button data-filter="iran">Iran</button></li>
        <li><button data-filter="venezuela">Venezuela</button></li>
        <li><button data-filter="cuba">Cuba</button></li>
        <li><button data-filter="ct">Counterterrorism</button></li>
        <li><button data-filter="nk">North Korea</button></li>
        <li><button data-filter="cyber">Cyber</button></li>
      </ul>
    </div>
  </aside>

  <!-- Feed -->
  <section class="feed-col">
    <div class="feed-header">
      <div class="feed-heading" id="feedHeading">All Actions</div>
      <div class="feed-count" id="feedCount"></div>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Search actions, entities, programs…">
    </div>
    <div id="feed"></div>
  </section>

  <!-- Detail -->
  <aside class="detail-panel">
    <div class="sidebar-label">Action Detail</div>
    <div class="detail-placeholder" id="detailPlaceholder">Select an action<br>to view details</div>
    <div class="detail-content" id="detailContent"></div>
  </aside>
</main>

      "On-chain address designations are directly enforceable — blockchain analytics tools should be updated"

    url: "https://www.federalregister.gov/documents/2026/03/17/2026-05114/notice-of-ofac-sanctions-action"
  },
  {
    id: 11,
    date: "Feb 27, 2026",
    ts: 20260227,
    title: "SDN removal and identifying information update",
    desc: "OFAC unblocked and removed one individual from the SDN List, and updated identifying information for a separate individual whose assets remain blocked under U.S. jurisdiction.",
    types: ["removal", "update"],
    programs: [],
    implications: [
      "Parties holding blocked assets of the removed individual should seek unblocking promptly",
      "Updated identifying information for the second individual — re-screen against updated SDN entry",
      "Administrative update — monitor for any enforcement implications"
    ],
    url: "https://www.federalregister.gov/documents/2026/03/03/2026-04177/notice-of-ofac-sanctions-actions"
  }
];
/* ACTIONS_END */

let activeFilter = 'all';
let selectedId = null;
let searchQuery = '';

function countBy(type) {
  if (['designation','removal','license','update'].includes(type))
    return ACTIONS.filter(a => a.types.includes(type)).length;
  return ACTIONS.filter(a => a.programs.includes(type)).length;
}

function updateStats() {
  document.getElementById('statDesig').textContent = countBy('designation');
  document.getElementById('statRemoval').textContent = countBy('removal');
  document.getElementById('statLicense').textContent = countBy('license');
  document.getElementById('statTotal').textContent = ACTIONS.length;
  document.getElementById('countAll').textContent = ACTIONS.length;
  document.getElementById('countDesig').textContent = countBy('designation');
  document.getElementById('countRemoval').textContent = countBy('removal');
  document.getElementById('countLicense').textContent = countBy('license');
  document.getElementById('countUpdate').textContent = countBy('update');
}

function getFiltered() {
  let items = ACTIONS;
  if (activeFilter !== 'all') {
    if (['designation','removal','license','update'].includes(activeFilter))
      items = items.filter(a => a.types.includes(activeFilter));
    else
      items = items.filter(a => a.programs.includes(activeFilter));
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(a =>
      a.title.toLowerCase().includes(q) ||
      a.desc.toLowerCase().includes(q) ||
      a.programs.join(' ').includes(q) ||
      a.types.join(' ').includes(q)
    );
  }
  return items;
}

function renderFeed() {
  const items = getFiltered();
  const feed = document.getElementById('feed');
  document.getElementById('feedCount').textContent = items.length + ' action' + (items.length !== 1 ? 's' : '');

  if (!items.length) {
    feed.innerHTML = '<div class="empty-state">No actions match your filters.</div>';
    return;
  }

  feed.innerHTML = items.map(a => {
    const typeTags = a.types.map(t => `<span class="tag ${t}">${t}</span>`).join('');
    const progTags = a.programs.map(p => `<span class="tag ${p}">${p === 'ct' ? 'counterterrorism' : p === 'nk' ? 'N. Korea' : p}</span>`).join('');
    const sel = selectedId === a.id ? ' selected' : '';
    return `<div class="action-card${sel}" onclick="selectAction(${a.id})">
      <div class="card-top">
        <div class="card-title">${a.title}</div>
        <div class="card-date">${a.date}</div>
      </div>
      <div class="card-desc">${a.desc}</div>
      <div class="card-tags">${typeTags}${progTags}</div>
    </div>`;
  }).join('');
}

function selectAction(id) {
  selectedId = id;
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;

  renderFeed();

  const typeTags = a.types.map(t => `<span class="tag ${t}">${t}</span>`).join('');
  const progTags = a.programs.map(p => `<span class="tag ${p}">${p === 'ct' ? 'counterterrorism' : p === 'nk' ? 'N. Korea' : p}</span>`).join('');
  const impList = a.implications.map(i => `<li>${i}</li>`).join('');

  document.getElementById('detailPlaceholder').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.className = 'detail-content visible';
  dc.innerHTML = `
    <div class="detail-date">${a.date}</div>
    <div class="detail-title">${a.title}</div>
    <div class="detail-program-bar">${typeTags}${progTags}</div>
    <div class="detail-body">${a.desc}</div>
    <div class="detail-section-label">Practice Implications</div>
    <ul class="detail-implications">${impList}</ul>
    <a class="detail-link" href="${a.url}" target="_blank">View Source → OFAC / Federal Register</a>
    <button class="ask-claude-btn" onclick="askClaude(${a.id})">Ask Claude about this action ↗</button>
  `;
}

function askClaude(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  const q = `I'm an OFAC sanctions attorney. Can you give me a detailed analysis of this OFAC action and its practical implications for my clients: "${a.title}" (${a.date}). Details: ${a.desc}`;
  if (window.opener) window.opener.postMessage({ type: 'sendPrompt', text: q }, '*');
  else alert('Open this app from within Claude to use the Ask Claude feature.');
}

function updateTicker() {
  const items = ACTIONS.slice(0, 6);
  const text = items.map(a => `<span><span class="dot">●</span>${a.date} — ${a.title}</span>`).join('');
  const inner = document.getElementById('tickerInner');
  inner.innerHTML = text + text;
}

function setFilters() {
  document.querySelectorAll('#typeFilters button, #progFilters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#typeFilters button, #progFilters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      const labels = { all: 'All Actions', designation: 'Designations', removal: 'Removals', license: 'General Licenses', update: 'Updates', russia: 'Russia', iran: 'Iran', venezuela: 'Venezuela', cuba: 'Cuba', ct: 'Counterterrorism', nk: 'North Korea', cyber: 'Cyber' };
      document.getElementById('feedHeading').textContent = labels[activeFilter] || activeFilter;
      renderFeed();
    });
  });
}

function fetchAndRender() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = '↻ Refreshing…';
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.textContent = '↻ Refresh';
    const now = new Date();
    document.getElementById('lastUpdatedTime').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    renderFeed();
    updateStats();
    updateTicker();
  }, 1200);
}

// Init
updateStats();
updateTicker();
renderFeed();
setFilters();
document.getElementById('lastUpdatedTime').textContent = LAST_UPDATED;

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderFeed();
});

// Auto-refresh every 5 minutes
setInterval(fetchAndRender, 5 * 60 * 1000);
</script>
</body>
</html>
